{%- if page.ref -%}
<aside id="translation-suggest" hidden data-current-lang="{{ page.lang }}" data-ref="{{ page.ref }}">
  <span data-suggest-text></span>
  <a href="" data-suggest-link></a>
  <button type="button" data-suggest-dismiss aria-label="Dismiss">×</button>
</aside>
<style>
  #translation-suggest {
    margin: 0 0 1.5em;
    padding: .5em .75em;
    border: 1px solid #ddd;
    background: #fafafa;
    display: flex;
    align-items: baseline;
    gap: .35em;
    font-size: .9em;
  }
  #translation-suggest [data-suggest-dismiss] {
    margin-left: auto;
    background: none;
    border: 0;
    font-size: 1.4em;
    line-height: 1;
    cursor: pointer;
    color: #888;
    padding: 0 .25em;
  }
  #translation-suggest [data-suggest-dismiss]:hover { color: #333; }
</style>
<script>
  (function () {
    var box = document.getElementById('translation-suggest');
    if (!box || !('localStorage' in window)) return;
    var currentLang = (box.dataset.currentLang || '').toLowerCase();
    var key = 'i18n-suggest-dismissed:' + box.dataset.ref;
    if (localStorage.getItem(key)) return;

    // Autonyms for languages we publish in. Add an entry when adding a translation.
    var labels = {
      en: { prefix: 'Read in', name: 'English' },
      fr: { prefix: 'Lire en', name: 'français' },
    };

    var alternates = {};
    var links = document.querySelectorAll('link[rel="alternate"][hreflang]');
    for (var i = 0; i < links.length; i++) {
      var l = (links[i].getAttribute('hreflang') || '').toLowerCase();
      if (l && l !== 'x-default') alternates[l] = links[i].getAttribute('href');
    }

    var prefs = (navigator.languages && navigator.languages.length)
      ? navigator.languages
      : [navigator.language || ''];

    var matchLang = null;
    for (var j = 0; j < prefs.length; j++) {
      var primary = (prefs[j] || '').toLowerCase().split('-')[0];
      if (!primary) continue;
      if (primary === currentLang) return; // already on the user's top-ranked available language
      if (alternates[primary]) { matchLang = primary; break; }
    }
    if (!matchLang) return;

    var label = labels[matchLang] || { prefix: 'Read in', name: matchLang };
    box.querySelector('[data-suggest-text]').textContent = label.prefix + ' ';
    var a = box.querySelector('[data-suggest-link]');
    a.textContent = label.name;
    a.setAttribute('href', alternates[matchLang]);
    a.setAttribute('hreflang', matchLang);
    box.hidden = false;

    box.querySelector('[data-suggest-dismiss]').addEventListener('click', function () {
      try { localStorage.setItem(key, '1'); } catch (e) {}
      box.hidden = true;
    });
  })();
</script>
{%- endif -%}
